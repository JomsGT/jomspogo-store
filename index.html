<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joms PoGo Store — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ... (Se mantienen tus estilos anteriores de Sidebar y Main) ... */
:root{
  --red:#e3350d;--gold:#c8920a;--blue:#1a73e8;--teal:#007a6e;
  --dark:#f4f6fb;--dark2:#ffffff;--dark3:#eef1f7;--card:#ffffff;
  --border:rgba(0,0,0,.1);--text:#1a1a2e;--muted:#5a6070;
  --green:#2e7d32;
  --sidebar-collapsed:58px;
  --sidebar-expanded:224px;
}
/* Estilos base (acortados para brevedad, asumiendo los tuyos) */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-collapsed);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:width .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;}
.sidebar:hover{width:var(--sidebar-expanded)}
/* ... (Mantén tus estilos de .nav-item, .main, .topbar, .prod-grid, etc.) ... */
/* Aquí pongo solo los estilos del Hero que pediste actualizar */

/* ── NUEVO EVENT DETAIL HERO PROFESIONAL ── */
.evd-wrap { max-width: 920px; margin: 0 auto; padding: 28px; }
.evd-back { display: inline-flex; align-items: center; gap: 6px; background: rgba(245,197,24,.08); border: 1px solid rgba(245,197,24,.2); color: var(--gold); padding: 8px 16px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; margin-bottom: 22px; transition: all .2s; }

.evd-hero {
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    background: #0f172a;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column; /* Apila imagen arriba y datos abajo */
}

/* Banner superior con la imagen */
.evd-banner {
    position: relative;
    width: 100%;
    min-height: 380px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: flex-end; /* Baja el texto al final de la imagen */
    padding: 40px;
}

/* Gradiente sutil para que el texto sea legible sin oscurecer toda la imagen */
.evd-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%);
    z-index: 1;
}

.evd-banner-info {
    position: relative;
    z-index: 2;
    width: 100%;
}

.evd-banner-type {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
}

.evd-banner-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* Fila de fechas (Ahora SEPARADA de la imagen) */
.evd-dates-row {
    background: #1e293b; /* Fondo sólido oscuro profesional */
    padding: 20px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 20px;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.evd-date-lbl { font-size: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.evd-date-val { font-size: 14px; color: #f1f5f9; font-weight: 500; }

.evd-cd-block { text-align: right; background: rgba(255,255,255,0.03); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
.evd-cd-val2 { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: #fff; }

/* Responsive */
@media(max-width: 600px) {
    .evd-banner { padding: 30px 20px; min-height: 280px; }
    .evd-dates-row { grid-template-columns: 1fr; padding: 20px; text-align: center; }
    .evd-cd-block { text-align: center; }
}
/* ... resto de estilos (tabs, spawns, etc.) ... */
</style>
</head>
<body>
<script type="module">
/* ... (Toda tu configuración de Firebase y funciones de carga) ... */

// BUSCA ESTA FUNCIÓN Y REEMPLÁZALA POR ESTA VERSIÓN ACTUALIZADA
function renderEventDetail(ev) {
  const st=getStatus(ev), cc=ev.color||'';
  const bH={
    live:`<span class="evd-badge live"><span class="live-dot"></span> En Vivo</span>`,
    upcoming:`<span class="evd-badge upcoming">📅 Próximo</span>`,
    ended:`<span class="evd-badge ended">✓ Finalizado</span>`
  }[st];
  
  const cdL=st==='live'?'Finaliza en:':st==='upcoming'?'Inicia en:':'Estado:';
  const cdC=st==='live'?'live':st==='ended'?'ended':'', cdI=st==='ended'?'Finalizado':'–';

  // Usamos la imagen de fondo directamente en el banner con background-image
  const hasBg = !!ev.img;
  const bgStyle = hasBg ? `style="background-image:url('${ev.img}')"` : '';
  const bannerClass = hasBg ? '' : `no-img ${cc}`;

  // ... (Aquí iría tu lógica de TZ_GROUPS y TABS que ya tienes) ...
  // Suponiendo que las variables TAB_DEFS y demás ya están calculadas arriba de esto en tu código original

  document.getElementById('evdWrap').innerHTML=`
    <button class="evd-back" onclick="goBackToEvents()">← Volver a Eventos</button>
    <button class="share-link-btn" onclick="shareLink('event','${ev._id||ev.id}','${ev.name.replace(/'/g,"\\'")}')">🔗 Compartir</button>
    
    <div class="evd-hero">
      <div class="evd-banner ${bannerClass}" ${bgStyle}>
        <div class="evd-banner-info">
          <div class="evd-banner-type">${ev.type}</div>
          <div class="evd-banner-title">${ev.name}</div>
          <div class="evd-badges">${bH}</div>
        </div>
      </div>

      <div class="evd-dates-row">
        <div>
          <div class="evd-date-lbl">Inicio</div>
          <div class="evd-date-val">${ev.startStr}</div>
        </div>
        <div>
          <div class="evd-date-lbl">Fin</div>
          <div class="evd-date-val">${ev.endStr}</div>
        </div>
        <div class="evd-cd-block">
          <div class="evd-cd-lbl2">${cdL}</div>
          <div class="evd-cd-val2 ${cdC}" id="evd-cd">${cdI}</div>
        </div>
      </div>
    </div>

    <div class="evd-tabs-bar">${/* Aquí van tus botones de tabs */}</div>
    <div class="evd-body">
       </div>`;

  // Lógica de contadores y relojes que ya tenías...
}
</script>
</body>
</html>
